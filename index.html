<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="NearestWC" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta
      name="description"
      content="Community-powered map of public toilets worldwide. Find, rate and review WCs near you."
    />
    <meta name="theme-color" content="#1a73e8" />
    <meta property="og:title" content="NearestWC - Find a toilet near you" />
    <meta
      property="og:description"
      content="Community-powered map of public toilets worldwide. Find, rate and review WCs near you."
    />
    <meta property="og:image" content="/icon-512.png" />
    <title>NearestWC - Find a toilet near you</title>
    <style>
      #nwc-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #1a73e8;
        display: grid;
        place-items: center;
        opacity: 0;
        animation: nwcSplashFadeIn 0.35s ease forwards;
        transition: opacity 0.28s ease;
      }

      #nwc-splash.nwc-hide {
        opacity: 0;
        pointer-events: none;
      }

      #nwc-splash .nwc-splash-inner {
        text-align: center;
        color: #fff;
      }

      #nwc-splash .nwc-splash-mark {
        width: 74px;
        height: 74px;
        margin: 0 auto 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.34);
        display: grid;
        place-items: center;
        font-size: 38px;
        font-weight: 800;
        line-height: 1;
      }

      #nwc-splash .nwc-splash-text {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      @keyframes nwcSplashFadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="nwc-splash" aria-hidden="true">
      <div class="nwc-splash-inner">
        <div class="nwc-splash-mark">W</div>
        <p class="nwc-splash-text">NearestWC</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
